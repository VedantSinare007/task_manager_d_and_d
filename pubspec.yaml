name: flodo_tasks
description: Flodo AI Take-Home - Task Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.1

  # HTTP client
  dio: ^5.4.3+1

  # Local storage (drafts persistence)
  shared_preferences: ^2.2.3

  # UI utilities
  intl: ^0.19.0
  flutter_slidable: ^3.1.0  # swipe-to-delete on task cards

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.2

flutter:
  uses-material-design: true